<div class="flex h-screen bg-gray-100">
  <!-- Sidebar -->
  <aside class="w-64 bg-gradient-to-b from-indigo-600 to-purple-600 text-white p-6">
    <h2 class="text-2xl font-bold mb-6">WellBeing Hub</h2>
    <nav>
      <ul>
        <li class="mb-4"><a routerLink="/dashboard" class="hover:text-cyan-300">Dashboard</a></li>
        <li class="mb-4"><a routerLink="/profile" class="hover:text-cyan-300">Profil</a></li>
        <li><a routerLink="/settings" class="hover:text-cyan-300">Paramètres</a></li>
      </ul>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-8">
    <h1 class="text-3xl font-bold text-indigo-700 mb-6">Tableau de bord</h1>
    
    <div class="grid grid-cols-2 gap-6">
      <!-- Hydratation -->
      <div class="bg-white p-6 rounded-xl shadow-md">
        <h3 class="text-xl font-semibold text-indigo-600">Hydratation</h3>
        <p class="text-2xl">{{ hydration }} ml</p>
      </div>

      <!-- Sommeil -->
      <div class="bg-white p-6 rounded-xl shadow-md">
        <h3 class="text-xl font-semibold text-indigo-600">Sommeil</h3>
        <p class="text-2xl">{{ sleep }} heures</p>
      </div>

      <!-- Humeur -->
      <div class="bg-white p-6 rounded-xl shadow-md">
        <h3 class="text-xl font-semibold text-indigo-600">Humeur</h3>
        <p class="text-2xl">{{ mood }}</p>
      </div>

      <!-- Activité -->
      <div class="bg-white p-6 rounded-xl shadow-md">
        <h3 class="text-xl font-semibold text-indigo-600">Activité</h3>
        <p class="text-2xl">{{ activity }} min</p>
      </div>
    </div>
  </main>
</div>
