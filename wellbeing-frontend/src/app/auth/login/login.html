<div class="flex items-center justify-center h-screen bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500">
    <form (ngSubmit)="login()" class="bg-white p-8 rounded-xl shadow-lg w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-indigo-600">Connexion</h2>

        <input [(ngModel)]="email" name="email" type="email" placeholder="Email"
            class="w-full p-3 mb-4 border rounded focus:ring-2 focus:ring-indigo-400" required>

        <input [(ngModel)]="password" name="password" type="password" placeholder="Mot de passe"
            class="w-full p-3 mb-4 border rounded focus:ring-2 focus:ring-indigo-400" required>

        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 transition">Se
            connecter</button>
    </form>
</div>
